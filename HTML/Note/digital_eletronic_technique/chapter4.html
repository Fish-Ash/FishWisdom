        <h2>第一节 组合逻辑电路的分析</h2>
        <p><b>组合逻辑电路</b>：
        <br>&nbsp;&nbsp;&nbsp;&nbsp;输出状态只取决于同一时刻输入状态的逻辑电路
        <br>
        <br>组合逻辑电路分析方法：
        <ol>
            <li>写出各级逻辑函数表达式，最终得到输出信号与输入信号的逻辑函数表达式，并对其化简和变换。</li>
            <li>列出真值表，分析电路确定其功能。</li>
        </ol>
        奇校验电路：
        <br><img src="./img/4.1.1.png", width="450">
        $$Z = A⊕B\\
        L = Z⊕C = A⊕B⊕C
        $$

        偶校验器：
        <br>&nbsp;&nbsp;&nbsp;&nbsp;奇校验器输出端加一级反相器
